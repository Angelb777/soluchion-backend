<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Login Admin - Soluchion</title>
  <link rel="icon" href="/img/logo.png" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #ece537;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .login-box {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }

    .login-box img {
      width: 180px;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 30px;
      color: #232d92;
    }

    input {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #232d92;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #232d92;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1a237e;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 30px 20px;
      }

      .login-box img {
        width: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="/img/logocompleto.png" alt="Soluchion Logo" />
    <h2>Acceso Backoffice</h2>
    <form method="POST" action="/admin/login">
      <input type="email" name="email" placeholder="Correo" required />
      <input type="password" name="password" placeholder="Contraseña" required />
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
