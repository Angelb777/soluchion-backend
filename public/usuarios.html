<!-- public/usuarios.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios registrados</title>
  <style>
    body { font-family: Arial; padding: 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
  </style>
</head>
<body>
  <h1>Lista de usuarios</h1>
  <table id="userTable">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Fecha de registro</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const claveAdmin = "MI_CLAVE_SECRETA_ADMIN"; // 👈 asegúrate de que esta clave solo tú la sepas

    fetch('/api/users', {
      headers: {
        "Authorization": "Bearer " + claveAdmin
      }
    })
    .then(res => res.json())
    .then(users => {
      const tbody = document.querySelector('#userTable tbody');
      users.forEach(u => {
        const row = `
          <tr>
            <td>${u.nombre}</td>
            <td>${u.email}</td>
            <td>${u.role}</td>
            <td>${new Date(u.createdAt).toLocaleString()}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    })
    .catch(err => {
      alert("❌ Error al cargar usuarios");
      console.error(err);
    });
  </script>
</body>
</html>
